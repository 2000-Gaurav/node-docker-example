apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
  labels:
    app: node-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
        - name: node-app
          # Make sure to replace this with your actual image from ACR or Docker Hub
          image: pinkman111/node-docker-examples:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
            - containerPort: 9000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              value: "mongodb://mongodb:27017"
            - name: APP_PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: node-app-service
spec:
  type: LoadBalancer
  selector:
    app: node-app
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
